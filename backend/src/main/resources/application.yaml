spring:
  application:
    name: dasha.
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

admin:
  username: ${ADMIN_USERNAME}
  password: ${ADMIN_PASSWORD}

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 86400000

minio:
  endpoint: ${MINIO_ENDPOINT}
  token:
    access: ${MINIO_ACCESS}
    secret: ${MINIO_SECRET}
  bucket:
    name: ${MINIO_BUCKETNAME}

icecast:
  host: ${ICECAST_HOST:localhost}
  port: ${ICECAST_PORT:8000}
  mount: ${ICECAST_MOUNT:stream}
  source:
    password: ${ICECAST_SOURCE_PASSWORD:hackme}