name: Backend CI

on:
  push:
    branches: [master, dev-dasha]
    paths:
      - 'backend/**'
  pull_request:
    branches: [master]
    paths:
      - 'backend/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: backend
        run: ./mvnw clean package -DskipTests

      - name: Build Docker image
        working-directory: backend
        run: docker build -t dasha-backend:${{ github.sha }} .
